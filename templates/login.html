<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Risepack Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
  }
  .logo h1 span { color: #f97316; }
  .logo p { color: #6b7280; font-size: 14px; margin-top: 6px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #9ca3af;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    background: #0f1117;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #f97316; }
  button {
    width: 100%;
    padding: 13px;
    background: #f97316;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #ea6c0a; }
  .error {
    background: #3b1212;
    border: 1px solid #7f1d1d;
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Rise<span>pack</span></h1>
    <p>Analytics Dashboard</p>
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Email</label>
    <input type="email" name="email" placeholder="manager@risepack.id" required autofocus>
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••" required>
    <button type="submit">Masuk</button>
  </form>
</div>
</body>
</html>
